<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 120 120"
     width="140"
     height="140">

  <defs>
    <linearGradient id="avionixTech" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EF1FF"/>
      <stop offset="100%" stop-color="#3A5BFF"/>
    </linearGradient>

    <style>
      .line {
        fill: none;
        stroke: url(#avionixTech);
        stroke-width: 4;
        stroke-dasharray: 420;
        stroke-dashoffset: 420;
        animation: draw 1.6s ease forwards, pulse 4s ease-in-out 1.8s infinite;
      }

      .delay1 { animation-delay: 0s, 1.8s; }
      .delay2 { animation-delay: .3s, 1.8s; }
      .delay3 { animation-delay: .6s, 1.8s; }

      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }

      @keyframes pulse {
        0%,100% { stroke-opacity: 1; }
        50% { stroke-opacity: .65; }
      }

      svg:hover .line {
        stroke-width: 5;
        filter: drop-shadow(0 0 10px rgba(14,241,255,.45));
        transition: .25s ease;
      }
    </style>
  </defs>

  <!-- Hexagon -->
  <polygon class="line delay1"
    points="60,10 102,34 102,86 60,110 18,86 18,34"/>

  <!-- A -->
  <path class="line delay2"
    d="M42 84 L60 32 L78 84
       M50 64 H70"
    stroke-linecap="square"/>

  <!-- S -->
  <path class="line delay3"
    d="M78 42
       C70 42, 66 46, 66 52
       C66 58, 82 58, 82 68
       C82 78, 70 80, 62 74"
    stroke-linecap="round"/>
</svg>
